<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulador Pago Contra Entrega</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .options {
            margin-top: 10px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
            font-size: 14px;
        }

        .result strong {
            display: block;
            margin-top: 5px;
        }

        .divider {
            margin: 10px 0;
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Pago Contra Entrega</h2>

        <label>Valor total a cobrar (Q)</label>
        <input type="number" id="producto" value="1200">

        <label>Cantidad de piezas</label>
        <input type="number" id="piezas" value="1" min="1">

        <label>Costo de envío (Q)</label>
        <input type="number" id="envio" value="20">

        <div class="options">
            <label>¿Quién paga el envío?</label>
            <input type="radio" name="envioPago" value="destinatario" checked> Destinatario<br>
            <input type="radio" name="envioPago" value="remitente"> Remitente
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="comisionCliente"> Incluir comisión al destinatario (5%)
            </label>
        </div>

        <div class="result" id="resultado"></div>
    </div>

    <script>
        function calcular() {
            let producto = parseFloat(document.getElementById('producto').value) || 0;
            let piezas = parseInt(document.getElementById('piezas').value) || 1;
            let envio = parseFloat(document.getElementById('envio').value) || 0;
            let envioPago = document.querySelector('input[name="envioPago"]:checked').value;
            let comisionCliente = document.getElementById('comisionCliente').checked;

            if (piezas <= 0) piezas = 1;

            let comision = producto * 0.05;

            let totalDestinatario = producto;
            let totalRemitente = producto;

            // envío
            if (envioPago === 'destinatario') {
                totalDestinatario += envio;
            } else {
                totalRemitente -= envio;
            }

            // comisión
            if (comisionCliente) {
                totalDestinatario += comision;
            } else {
                totalRemitente -= comision;
            }

            // cálculos por pieza
            let porPiezaDestinatario = totalDestinatario / piezas;
            let porPiezaRemitente = totalRemitente / piezas;

            document.getElementById('resultado').innerHTML = `
        <strong>Destinatario pagará: Q${totalDestinatario.toFixed(2)}</strong>
        <strong>Remitente recibirá: Q${totalRemitente.toFixed(2)}</strong>

        <div class="divider"></div>

        <strong>Por pieza:</strong>
        <span>Destinatario paga: Q${porPiezaDestinatario.toFixed(2)}</span><br>
        <span>Remitente recibe: Q${porPiezaRemitente.toFixed(2)}</span>

        <div class="divider"></div>

        <span>Comisión total: Q${comision.toFixed(2)}</span><br>
        <span>Envío: Q${envio.toFixed(2)}</span>
    `;
        }

        // eventos

        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('input', calcular);
        });

        calcular();
    </script>

</body>

</html>
